  <path d="M580 210 L460 210" fill="none" stroke="#D85A30" stroke-width="1.5" marker-end="url(#ah-red)" stroke-dasharray="4 3" style="fill:none;stroke:rgb(216, 90, 48);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-dasharray:4px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M450 204 Q480 145 508 104" fill="none" stroke="#D85A30" stroke-width="1.5" marker-end="url(#ah-red)" stroke-dasharray="4 3" style="fill:none;stroke:rgb(216, 90, 48);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-dasharray:4px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

