<svg width="100%" viewBox="0 0 680 360" role="img" style="" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">通常の投影とオブリーク投影の比較</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">通常near clipではミラー面前が映り込むが、オブリーク投影ではミラー面でクリップされる</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  <mask id="imagine-text-gaps-xjfjkx" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="360" fill="white"/><rect x="110.0703125" y="24" width="110.09294128417969" height="22" fill="black" rx="2"/><rect x="196" y="72" width="44" height="19" fill="black" rx="2"/><rect x="136.921875" y="114" width="57.71592712402344" height="19" fill="black" rx="2"/><rect x="137" y="208" width="56" height="19" fill="black" rx="2"/><rect x="91.484375" y="262" width="147.03125" height="19" fill="black" rx="2"/><rect x="446.0703125" y="24" width="138.09295654296875" height="22" fill="black" rx="2"/><rect x="546" y="72" width="44" height="19" fill="black" rx="2"/><rect x="456.53125" y="208" width="116.9375" height="19" fill="black" rx="2"/><rect x="435.609375" y="262" width="158.78125" height="19" fill="black" rx="2"/></mask></defs>

  <!-- 左：通常 -->
  <text x="165" y="40" text-anchor="middle" fill="var(--color-text-primary)" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:auto">通常の near clip</text>
  <rect x="40" y="56" width="250" height="244" rx="10" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5" style="fill:rgb(38, 38, 36);stroke:rgba(222, 220, 209, 0.15);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- カメラ -->
  <rect x="151" y="72" width="28" height="20" rx="3" fill="var(--color-background-secondary)" stroke="#5F5E5A" stroke-width="1.5" style="fill:rgb(38, 38, 36);stroke:rgb(95, 94, 90);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="165" cy="82" r="5" fill="none" stroke="#5F5E5A" stroke-width="1.2" style="fill:none;stroke:rgb(95, 94, 90);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
